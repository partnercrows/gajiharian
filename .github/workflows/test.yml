name: Test & Lint

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` intermittently fails to install the correct platform-specific
      # optional dependency (rolldown's native binding) on Linux runners even
      # though it's correctly listed in the lockfile -- a known npm bug
      # (npm/cli#4828). `npm install` resolves it reliably.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Lint (source only, non-blocking)
        run: npx eslint src --max-warnings=-1 || true
